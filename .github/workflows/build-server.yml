name: Build Portable Server

on:
  push:
    branches: [main]
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: windows-latest
            target: win-x64
            node_platform: win
            node_arch: x64
            archive: zip
          - runner: ubuntu-latest
            target: linux-x64
            node_platform: linux
            node_arch: x64
            archive: tar.gz
          - runner: ubuntu-24.04-arm
            target: linux-arm64
            node_platform: linux
            node_arch: arm64
            archive: tar.gz

    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Compile TypeScript
        working-directory: server
        run: npx tsc

      - name: Prune dev dependencies
        working-directory: server
        run: npm prune --production

      # --- Download portable Node.js binary ---

      - name: Download portable Node.js (Windows)
        if: matrix.node_platform == 'win'
        shell: pwsh
        run: |
          $nodeVersion = node -e "console.log(process.version)"
          $url = "https://nodejs.org/dist/$nodeVersion/node-$nodeVersion-win-x64.zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile node-portable.zip
          Expand-Archive -Path node-portable.zip -DestinationPath node-extracted
          Copy-Item "node-extracted/node-$nodeVersion-win-x64/node.exe" -Destination node.exe

      - name: Download portable Node.js (Linux)
        if: matrix.node_platform == 'linux'
        run: |
          NODE_VERSION=$(node -e "console.log(process.version)")
          URL="https://nodejs.org/dist/$NODE_VERSION/node-$NODE_VERSION-linux-${{ matrix.node_arch }}.tar.xz"
          echo "Downloading $URL"
          curl -fsSL "$URL" -o node-portable.tar.xz
          tar xf node-portable.tar.xz
          cp "node-$NODE_VERSION-linux-${{ matrix.node_arch }}/bin/node" node

      # --- Download NSSM (Windows only) ---

      - name: Download NSSM
        if: matrix.node_platform == 'win'
        shell: pwsh
        run: |
          $url = "https://github.com/ONLYOFFICE/nssm/releases/download/v2.24.1/nssm_x64.zip"
          Write-Host "Downloading NSSM from $url"
          Invoke-WebRequest -Uri $url -OutFile nssm.zip
          Expand-Archive -Path nssm.zip -DestinationPath nssm-extracted
          $nssm = Get-ChildItem -Path nssm-extracted -Filter nssm.exe -Recurse | Select-Object -First 1
          Copy-Item $nssm.FullName -Destination nssm.exe

      # --- Assemble distribution ---

      - name: Assemble distribution (Windows)
        if: matrix.node_platform == 'win'
        shell: pwsh
        run: |
          $dist = "DMXr-Server-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $dist
          Copy-Item node.exe -Destination $dist/
          Copy-Item nssm.exe -Destination $dist/
          Copy-Item server/scripts/DMXr-Server.bat -Destination $dist/
          Copy-Item server/scripts/install-service.bat -Destination $dist/
          Copy-Item server/scripts/uninstall-service.bat -Destination $dist/
          Copy-Item -Recurse server/dist -Destination $dist/dist
          Copy-Item -Recurse server/node_modules -Destination $dist/node_modules
          Copy-Item -Recurse server/public -Destination $dist/public
          Copy-Item server/package.json -Destination $dist/
          Compress-Archive -Path $dist -DestinationPath "DMXr-Server-${{ matrix.target }}.zip"

      - name: Assemble distribution (Linux)
        if: matrix.node_platform == 'linux'
        run: |
          dist="DMXr-Server-${{ matrix.target }}"
          mkdir -p "$dist"
          cp node "$dist/"
          cp server/scripts/dmxr-server.sh "$dist/"
          cp server/scripts/install.sh "$dist/"
          cp server/scripts/uninstall.sh "$dist/"
          chmod +x "$dist"/{node,dmxr-server.sh,install.sh,uninstall.sh}
          cp -r server/dist "$dist/dist"
          cp -r server/node_modules "$dist/node_modules"
          cp -r server/public "$dist/public"
          cp server/package.json "$dist/"
          tar czf "DMXr-Server-${{ matrix.target }}.tar.gz" "$dist"

      # --- Upload artifacts ---

      - name: Upload release asset
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ github.event_name != 'release' }}
          files: DMXr-Server-${{ matrix.target }}.${{ matrix.archive }}

      - name: Upload workflow artifact
        if: github.event_name != 'release' && !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: DMXr-Server-${{ matrix.target }}
          path: DMXr-Server-${{ matrix.target }}.${{ matrix.archive }}
